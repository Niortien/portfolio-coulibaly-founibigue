name: CI/CD — Portfolio

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Lint + Type check + Build
  # ─────────────────────────────────────────
  quality:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

  # ─────────────────────────────────────────
  # JOB 2 : Deploy (géré par Vercel nativement)
  # ─────────────────────────────────────────
  # Vercel déploie automatiquement via son intégration GitHub :
  #   • Push sur main  → déploiement Production
  #   • Pull Request   → déploiement Preview
  # Aucune configuration supplémentaire requise.
